<!DOCTYPE html>
<html lang="en">
<head>
    <title>President — Ghost Wire</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/playfieldStyles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cardStyles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/ai_profiles.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cardRenderer.js') }}"></script>
    <script src="{{ url_for('static', filename='js/gameplay.js') }}"></script>
</head>
<body>

    <!-- Ghost Wire atmosphere -->
    <div class="scanlines" aria-hidden="true"></div>
    <div class="table-watermark" aria-hidden="true">∴</div>

    <div class="game-layout">

        <!-- ── Stats panel (left) ─────────────────────────── -->
        <aside class="side-panel stats-side">
            <div class="panel-rule"></div>
            <div id="stats-panel"></div>
            <div class="panel-rule"></div>
        </aside>

        <!-- ── Table (centre) ────────────────────────────── -->
        <div class="table-wrapper">

            <!-- Oval table decoration -->
            <div class="felt-oval" aria-hidden="true"></div>
            <div class="table-glow"  aria-hidden="true"></div>

            <div class="grid-container">

                <!-- Left Player -->
                <div class="playfield_left" id="playfield_left">
                    <div class="player_left">
                        <div class="seat-panel">
                            <div class="seat-avatar" id="opponent-1-avatar"></div>
                            <h2 class="seat-name" id="opponent-1-name">Waiting…</h2>
                            <div class="hand_play_area">
                                <div id="opponent-1-hand"></div>
                            </div>
                        </div>
                    </div>
                    <div id="opponent-1-ai-select" class="ai-select-panel" style="display:none;">
                        <label class="ai-label" for="ai-opponent-1">Add AI</label>
                        <select id="ai-opponent-1" class="ai-select"></select>
                        <button class="btn-ghost btn-sm" onclick="addAIPlayer(1)">Add</button>
                    </div>
                </div>

                <!-- Opposite Player -->
                <div class="playfield_center" id="playfield_center">
                    <div class="player_opposite">
                        <div class="seat-panel">
                            <div class="seat-avatar" id="opponent-2-avatar"></div>
                            <h2 class="seat-name" id="opponent-2-name">Waiting…</h2>
                            <div class="hand_play_area">
                                <div id="opponent-2-hand"></div>
                            </div>
                        </div>
                    </div>
                    <div id="opponent-2-ai-select" class="ai-select-panel" style="display:none;">
                        <label class="ai-label" for="ai-opponent-2">Add AI</label>
                        <select id="ai-opponent-2" class="ai-select"></select>
                        <button class="btn-ghost btn-sm" onclick="addAIPlayer(2)">Add</button>
                    </div>
                </div>

                <!-- Right Player -->
                <div class="playfield_right" id="playfield_right">
                    <div class="player_right">
                        <div class="seat-panel">
                            <div class="seat-avatar" id="opponent-3-avatar"></div>
                            <h2 class="seat-name" id="opponent-3-name">Waiting…</h2>
                            <div class="hand_play_area">
                                <div id="opponent-3-hand"></div>
                            </div>
                        </div>
                    </div>
                    <div id="opponent-3-ai-select" class="ai-select-panel" style="display:none;">
                        <label class="ai-label" for="ai-opponent-3">Add AI</label>
                        <select id="ai-opponent-3" class="ai-select"></select>
                        <button class="btn-ghost btn-sm" onclick="addAIPlayer(3)">Add</button>
                    </div>
                </div>

                <!-- Bottom: Current Player -->
                <div class="playfield_bottom" id="playfield_bottom">
                    <h2 class="seat-name you-name" id="player_id"></h2>
                    <div class="player_you">
                        <div class="hand_play_area" style="position:relative;">
                            <div id="player-hand"></div>
                            <div id="compulsory-pass-overlay"
                                 onclick="playCards('PASSED')"
                                 style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.6); z-index:10; cursor:pointer; align-items:center; justify-content:center; border-radius:8px;">
                                <span class="pass-overlay-text">Pass</span>
                            </div>
                        </div>
                        <button class="btn-ghost" onclick="playCards('PASSED')">Pass</button>
                    </div>
                </div>

                <!-- Arena zones (played cards) -->
                <div class="arena_left">
                    <div class="arena_play_area_0" id="arena_left"></div>
                </div>
                <div class="arena_center">
                    <div class="arena_play_area_1" id="arena_center"></div>
                </div>
                <div class="arena_right">
                    <div class="arena_play_area_2" id="arena_right"></div>
                </div>
                <div class="arena_bottom">
                    <div class="arena_play_area_3" id="arena_bottom"></div>
                </div>

            </div><!-- .grid-container -->
        </div><!-- .table-wrapper -->

        <!-- ── Ads + controls panel (right) ──────────────── -->
        <aside class="side-panel ads-side">
            <div class="panel-rule"></div>

            <div class="controls-panel">
                <button class="btn-primary" id="start_game_button" onclick="readyToStart()" disabled>Start Game</button>
                <button class="btn-ghost"   id="ai-control-btn"    onclick="toggleAiControl()">Play as AI</button>
                <button class="btn-ghost"   id="logout-btn"        onclick="logOut(); return false;">Logout</button>
                <button class="btn-ghost btn-danger"               onclick="leaveGame()">Leave Game</button>
                <div class="speed-control">
                    <label class="speed-label" for="speed-slider">Speed</label>
                    <input type="range" id="speed-slider" min="1" max="20" value="10"
                           oninput="onSpeedSlider(this.value)">
                    <span id="speed-label-value">Normal</span>
                </div>
            </div>

            <div class="ads-area">
                <div class="ad-slot">
                    <div class="ad-label">Sponsored</div>
                    <div class="ad-name">MERIDIAN CORP</div>
                    <div class="ad-body">Infrastructure for the age of uncertainty.</div>
                    <div class="ad-cta">ENQUIRE →</div>
                </div>
                <div class="ad-slot">
                    <div class="ad-label">Sponsored</div>
                    <div class="ad-name">THE VAULT™</div>
                    <div class="ad-body">Your assets. Fortified. Encrypted.</div>
                    <div class="ad-cta">LEARN MORE</div>
                </div>
                <div class="quick-chat">
                    <div class="quick-chat-label">Quick Chat</div>
                    <button class="chat-btn">GG wp</button>
                    <button class="chat-btn">Your luck!</button>
                    <button class="chat-btn">Well played →</button>
                </div>
            </div>

            <div class="panel-rule"></div>
        </aside>

    </div><!-- .game-layout -->
</body>
</html>
